<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Editor Example</title>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Tailwind CSS via CDN (apenas para testes) com plugin de tipografia -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

  <!-- CORE -->
  <script src="../src/core/commands.js"></script>  <!-- TEM QUE VIR PRIMEIRO -->
  <script src="../src/core/plugin.js"></script>
  <script src="../src/core/selection.js"></script>
  <script src="../src/core/history.js"></script>

  <!-- EDITOR -->
  <script src="../src/editor.js"></script>

  <!-- PLUGINS -->
  <script src="../src/plugins/toolbar.js"></script>
  <script src="../src/plugins/basic-commands.js"></script>
  <script src="../src/plugins/sanitizer.js"></script>
  <script src="../src/plugins/preview.js"></script>
  <script src="../src/plugins/normalizer.js"></script>
  <script src="../src/plugins/link.js"></script>
  <script src="../src/plugins/table.js"></script>
  <script src="../src/plugins/image.js"></script>
  <script src="../src/plugins/video.js"></script>
  <script src="../src/plugins/fullscreen.js"></script>
  <script src="../src/plugins/history.js"></script>
  <script src="../src/plugins/codeview.js"></script>

</head>
<body class="bg-gray-50 p-8 text-gray-800 font-sans">

  <div class="max-w-5xl mx-auto bg-white p-8 shadow-sm border border-gray-200 rounded-lg">
    <h1 class="text-3xl font-bold mb-6 text-gray-900">Editor Demo</h1>

    <div id="editor"></div>
  </div>

  <script>
    $('#editor').wysiwygEditor({
      uploadImage: function (file, callback) {
        var formData = new FormData();
        formData.append('file', file);

        // Substitua '/api/upload' pela URL real do seu backend
        fetch('/api/upload', {
          method: 'POST',
          body: formData
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
          // Ajuste "data.url" de acordo com a resposta do seu backend
          if (data && data.url) {
            callback(data.url);
          } else {
            alert('Erro: URL da imagem não retornada pelo servidor.');
          }
        })
        .catch(function(err) {
          console.error('Erro no upload da imagem:', err);
          alert('Ocorreu um erro ao tentar enviar a imagem.');
        });
      },
      plugins: [
        ToolbarPlugin,
        BasicCommandsPlugin,
        SanitizerPlugin,
        PreviewPlugin,
        NormalizerPlugin,
        LinkPlugin,
        TablePlugin,
        ImagePlugin,
        VideoPlugin,
        FullscreenPlugin,
        HistoryPlugin,
        CodeViewPlugin 
      ]
    });
  </script>

</body>
</html>
